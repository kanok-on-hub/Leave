<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <title>Welcome • Leave Management</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background:#F3F4F6; color:#1F2937; -webkit-tap-highlight-color: transparent; }
    .card { background:#fff; border-radius: 1.25rem; border:1px solid #E5E7EB; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); padding: 1.1rem; }

    .input { background:#F9FAFB; border:1px solid #D1D5DB; border-radius:.9rem; padding:.85rem; width:100%; outline:none; transition:.2s; font-size:.95rem; color:#374151; }
    .input:focus { background:#fff; border-color:#3B82F6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
    .err { border-color:#EF4444 !important; background-color:#FEF2F2 !important; box-shadow:0 0 0 3px rgba(239,68,68,.15) !important; }

    .role-btn { width:100%; text-align:left; padding:1rem; border:1px solid transparent; border-radius:1rem; background:#F9FAFB; color:#6B7280; transition:.2s; position:relative; }
    .role-btn:active { transform: scale(.98); }
    .role-btn.selected { border-color:#3B82F6; background:#EFF6FF; color:#1D4ED8; box-shadow:0 4px 12px rgba(59,130,246,.15); font-weight:600; }
    .role-btn.selected::after { content:'✓'; position:absolute; top:8px; right:10px; font-size:12px; color:#2563EB; font-weight:bold; }

    .info-badge { font-size:11px; font-weight:700; background:#EFF6FF; color:#2563EB; padding:4px 12px; border-radius:9999px; border:1px solid #DBEAFE; display:inline-flex; align-items:center; white-space:nowrap; }

    ::-webkit-scrollbar { display: none; }
  </style>
</head>

<body class="pb-24 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col relative">

    <div class="bg-white px-6 pt-10 pb-4 rounded-b-3xl shadow-sm mb-5 relative z-10 border-b border-slate-100">
      <div class="flex items-center gap-4">
        <div id="avatarBox" class="w-12 h-12 rounded-full overflow-hidden border-2 border-white shadow-md ring-2 ring-blue-50 hidden">
          <img id="profileImg" src="" class="w-full h-full object-cover" alt="profile">
        </div>
        <div class="flex-1">
          <h1 id="title" class="text-2xl font-bold text-[#1F2937] tracking-tight">Welcome 👋</h1>
          <p id="subTitle" class="text-[#9CA3AF] text-sm font-medium mt-0.5 flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Loading...
          </p>
        </div>
        <span id="roleBadge" class="hidden info-badge">Role: -</span>
      </div>
    </div>

    <div class="px-5 space-y-5 flex-1" id="rootBox"></div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-[#F3F4F6] p-5 pb-[calc(1.25rem+env(safe-area-inset-bottom))] z-40" id="bottomBar">
      <button id="submitBtn" onclick="handleSubmit()"
        class="w-full bg-[#60A5FA] hover:bg-[#3B82F6] text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-200 active:scale-[0.98] transition-all">
        ลงทะเบียน
      </button>
    </div>

    <div id="loader" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50">
      <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-[180px] w-full">
        <div class="w-10 h-10 border-4 border-[#F3F4F6] border-t-[#3B82F6] rounded-full animate-spin mb-4"></div>
        <div class="font-bold text-[#1F2937] text-sm" id="loaderText">Processing...</div>
      </div>
    </div>
  </div>

<script>
  // ======= CONFIG =======
  const LIFF_ID  = "2008997153-n5oIYKUP";
  const API_URL  = "https://script.google.com/macros/s/AKfycbxHUdtv3_rR84mci9crkOGR0IEZYpAt5LxOFrf5lqCQbgJ-JO45acJwivTEs0zQ9qyTcg/exec";

  const DEFAULT_RETURN = "index.html";

  const ROLE_CACHE_KEY = "leave_onboard_v1";
  const BOOT_CACHE_KEY = "leave_boot_v1";
  const BOOT_TTL_MS = 3 * 60 * 1000;

  const SUCCESS_KEY = "leave_login_success_v1";
  // ======================

  const $ = (id) => document.getElementById(id);

  let userProfile = null;
  const selectedRoles = new Set(); // "Requester" | "Approver"

  function showLoader(msg){ $("loaderText").textContent = msg || "Processing..."; $("loader").classList.remove("hidden"); $("loader").classList.add("flex"); }
  function hideLoader(){ $("loader").classList.add("hidden"); $("loader").classList.remove("flex"); }
  function doneAndExit(){ try { liff.closeWindow(); } catch(e) {} }

  function markSuccess_(){ try { sessionStorage.setItem(SUCCESS_KEY, "1"); } catch(e) {} }
  function wasSuccess_(){ try { return sessionStorage.getItem(SUCCESS_KEY) === "1"; } catch(e) { return false; } }
  function clearSuccess_(){ try { sessionStorage.removeItem(SUCCESS_KEY); } catch(e) {} }

  function escapeHtml_(s) {
    return String(s ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  function setHeader_(title, subtitle) {
    $("title").textContent = title || "Welcome 👋";
    $("subTitle").innerHTML = subtitle || "";
  }
  function setRoleBadge_(roleText) {
    const b = $("roleBadge");
    if (!roleText) { b.classList.add("hidden"); return; }
    b.textContent = roleText;
    b.classList.remove("hidden");
  }

  function writeRoleCache_(payload) {
    try { localStorage.setItem(ROLE_CACHE_KEY, JSON.stringify(payload || {})); } catch(e) {}
  }

  function readBootCache_(userId){
    try{
      const raw = localStorage.getItem(BOOT_CACHE_KEY);
      if(!raw) return null;
      const obj = JSON.parse(raw);
      if(!obj || obj.userId !== userId) return null;
      if(Date.now() - (obj.ts||0) > BOOT_TTL_MS) return null;
      return obj.payload;
    }catch(e){ return null; }
  }
  function writeBootCache_(userId, payload){
    try{
      localStorage.setItem(BOOT_CACHE_KEY, JSON.stringify({ userId, ts: Date.now(), payload }));
    }catch(e){}
  }

  async function apiBootstrap_(userId){
    const res = await fetch(API_URL + "?action=bootstrap&userId=" + encodeURIComponent(userId));
    return res.json();
  }

  async function postFormUrlEncoded_(obj) {
    const body = new URLSearchParams();
    Object.keys(obj || {}).forEach(k => body.set(k, obj[k] == null ? "" : String(obj[k])));
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
      body: body.toString()
    });
    return res.json();
  }

  function getReturnUrl_() {
    const params = new URLSearchParams(location.search);
    const ret = params.get("return");
    return ret ? decodeURIComponent(ret) : DEFAULT_RETURN;
  }
  function goReturn_() {
    location.replace(getReturnUrl_());
  }

  // ✅ Requirement: login shows ONLY when not onboarded
  function redirectIfAlreadyOnboarded_(boot) {
    if (boot && boot.ok && boot.onboarded) {
      goReturn_();
      return true;
    }
    return false;
  }

  // -------- UI screens --------
  function renderFirstTime_() {
    selectedRoles.clear();
    setRoleBadge_("");

    setHeader_("Welcome 👋", `Hi, <span class="font-bold text-[#1F2937]">${escapeHtml_(userProfile?.displayName || "there")}</span>`);

    $("rootBox").innerHTML = `
      <div class="card space-y-4">
        <div>
          <label class="text-sm font-bold text-[#1F2937] block mb-2">Full Name <span class="text-[#EF4444]">*</span></label>
          <input id="fullName" type="text" class="input" placeholder="ชื่อ - นามสกุล" />
          <div id="nameErr" class="hidden text-xs text-[#EF4444] mt-2 font-bold">กรุณากรอกชื่อ-นามสกุล</div>
        </div>

        <div>
          <label class="text-sm font-bold text-[#1F2937] block mb-2">Nickname</label>
          <input id="nickname" type="text" class="input" placeholder="ชื่อเล่น" />
        </div>
      </div>

      <div class="space-y-3">
        <div class="flex justify-between items-center px-1 h-7">
          <label class="text-sm font-bold text-[#1F2937]">Role <span class="text-[#EF4444]">*</span></label>
        </div>

        <div class="grid grid-cols-1 gap-3">
          <button type="button" class="role-btn" onclick="toggleRole_('Requester', this)">
            <div class="text-2xl mb-1">📝</div>
            <span class="text-sm font-medium">Requester</span>
          </button>

          <button type="button" class="role-btn" onclick="toggleRole_('Approver', this)">
            <div class="text-2xl mb-1">✅</div>
            <span class="text-sm font-medium">Approver</span>
          </button>
        </div>

        <div id="roleErr" class="hidden text-xs text-[#EF4444] mt-2 font-bold px-1">กรุณาเลือกอย่างน้อย 1 Role</div>

        <div class="flex items-start gap-2 bg-[#F8FAFC] p-3 rounded-xl border border-[#F1F5F9]">
          <span class="text-[#3B82F6] mt-0.5">ℹ️</span>
          <div class="text-[11px] text-[#64748B] font-medium leading-relaxed">
            Your role is set once. Contact an admin if you need to change it.
          </div>
        </div>
      </div>
    `;

    $("bottomBar").classList.remove("hidden");
    $("submitBtn").textContent = "ลงทะเบียน";
    $("submitBtn").disabled = false;
  }

  function renderSystemError_(msg) {
    setHeader_("Something went wrong", "Please try again");
    setRoleBadge_("");

    $("rootBox").innerHTML = `
      <div class="card text-center py-10">
        <div class="text-4xl mb-3">⚠️</div>
        <div class="text-lg font-bold text-[#1F2937]">System Error</div>
        <div class="text-sm text-[#9CA3AF] mt-2">${escapeHtml_(msg || "ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่อีกครั้ง")}</div>
        <button class="w-full mt-6 bg-[#60A5FA] hover:bg-[#3B82F6] shadow-lg shadow-blue-200 text-white py-3.5 rounded-2xl font-bold active:scale-[0.98] transition-all" onclick="location.reload()">Try Again</button>
        <button class="w-full mt-3 bg-white border border-[#E5E7EB] text-[#9CA3AF] py-3 rounded-2xl font-bold hover:bg-[#F9FAFB] transition-colors active:scale-[0.98]" onclick="doneAndExit()">Close</button>
      </div>
    `;
    $("bottomBar").classList.add("hidden");
  }

  // -------- Role selector (multi) --------
  function toggleRole_(role, btn) {
    if (selectedRoles.has(role)) {
      selectedRoles.delete(role);
      btn.classList.remove("selected");
    } else {
      selectedRoles.add(role);
      btn.classList.add("selected");
    }
    $("roleErr")?.classList.add("hidden");
  }

  function clearNameErr_() {
    $("nameErr")?.classList.add("hidden");
    $("fullName")?.classList.remove("err");
  }
  function showNameErr_() {
    $("nameErr")?.classList.remove("hidden");
    $("fullName")?.classList.add("err");
    $("fullName")?.addEventListener("input", clearNameErr_, { once: true });
  }
  function showRoleErr_() { $("roleErr")?.classList.remove("hidden"); }

  // -------- Submit --------
  async function handleSubmit() {
    try {
      const fullName = ($("fullName")?.value || "").trim();
      const nickname = ($("nickname")?.value || "").trim();

      if (!fullName) { showNameErr_(); return; }
      if (selectedRoles.size === 0) { showRoleErr_(); return; }

      const rolesCsv = Array.from(selectedRoles).join(",");

      showLoader("Saving...");
      $("submitBtn").disabled = true;

      const data = await postFormUrlEncoded_({
        action: "register_user",
        userId: userProfile.userId,
        displayName: userProfile.displayName || "",
        fullName,
        nickname,
        roles: rolesCsv
      });

      if (!data || !data.ok) {
        hideLoader();
        $("submitBtn").disabled = false;
        alert("❌ Save failed: " + String(data?.error || "unknown_error"));
        return;
      }

      // update caches
      writeRoleCache_({
        userId: userProfile.userId,
        onboarded: true,
        role: String(data.role || "Requester"),
        roles: data.roles || [],
        canRequester: !!data.canRequester,
        canApprover: !!data.canApprover,
        name: fullName,
        nickname,
        ts: Date.now()
      });

      writeBootCache_(userProfile.userId, {
        ok: true,
        onboarded: true,
        role: String(data.role || "Requester"),
        roles: data.roles || [],
        canRequester: !!data.canRequester,
        canApprover: !!data.canApprover,
        name: fullName,
        nickname,
        displayName: userProfile.displayName || ""
      });

      hideLoader();

      markSuccess_();
      $("bottomBar").classList.add("hidden");

      // ✅ NEW: Approver-only => close LIFF automatically
      const isApproverOnly = (data.canApprover === true && data.canRequester === false);

      if (isApproverOnly) {
        $("rootBox").innerHTML = `
          <div class="card text-center py-12 mt-8 border border-[#10B981] shadow-lg shadow-green-100">
            <div class="w-20 h-20 rounded-full bg-[#ECFDF5] flex items-center justify-center text-[#10B981] text-4xl mx-auto mb-4 animate-bounce">✅</div>
            <div class="text-xl font-bold text-[#1F2937]">Registered Successfully</div>
            <div class="text-sm text-[#9CA3AF] mt-2">กำลังปิดหน้าต่าง...</div>
          </div>
        `;
        setTimeout(() => doneAndExit(), 700);
        return;
      }

      // Requester (or RA) => go return (index)
      $("rootBox").innerHTML = `
        <div class="card text-center py-12 mt-8 border border-[#10B981] shadow-lg shadow-green-100">
          <div class="w-20 h-20 rounded-full bg-[#ECFDF5] flex items-center justify-center text-[#10B981] text-4xl mx-auto mb-4 animate-bounce">✅</div>
          <div class="text-xl font-bold text-[#1F2937]">Registered Successfully</div>
          <div class="text-sm text-[#9CA3AF] mt-2">กำลังไปหน้าถัดไป...</div>
        </div>
      `;
      setTimeout(() => goReturn_(), 700);

    } catch (e) {
      hideLoader();
      $("submitBtn").disabled = false;
      alert("❌ Save failed: " + (e?.message || e));
    }
  }

  // -------- Init --------
  async function init() {
    showLoader("Loading...");
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) { liff.login(); return; }

    // if just registered successfully then reload => go return (safe)
    if (wasSuccess_()) {
      $("bottomBar").classList.add("hidden");
      $("rootBox").innerHTML = `
        <div class="card text-center py-12 mt-8 border border-[#10B981] shadow-lg shadow-green-100">
          <div class="w-20 h-20 rounded-full bg-[#ECFDF5] flex items-center justify-center text-[#10B981] text-4xl mx-auto mb-4">✅</div>
          <div class="text-xl font-bold text-[#1F2937]">Saved Successfully</div>
          <div class="text-sm text-[#9CA3AF] mt-2">กำลังไปหน้าถัดไป...</div>
        </div>
      `;
      setTimeout(() => goReturn_(), 500);
      return;
    }

    userProfile = await liff.getProfile();

    if (userProfile.pictureUrl) {
      $("profileImg").src = userProfile.pictureUrl;
      $("avatarBox").classList.remove("hidden");
    }

    renderFirstTime_();
    hideLoader();

    // enforce "login only when not onboarded"
    let boot = null;
    try {
      showLoader("Checking access...");
      boot = await apiBootstrap_(userProfile.userId);
    } catch (e) {
      hideLoader();
      renderSystemError_("ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่อีกครั้ง");
      return;
    }

    if (!boot || !boot.ok) {
      hideLoader();
      renderSystemError_(boot?.error || "bootstrap_failed");
      return;
    }

    writeBootCache_(userProfile.userId, boot);

    if (redirectIfAlreadyOnboarded_(boot)) return;

    clearSuccess_();
    hideLoader();
  }

  init().catch(err => {
    console.error(err);
    hideLoader();
    renderSystemError_("LIFF Init Error: " + (err?.message || err));
  });
</script>
</body>
</html>
