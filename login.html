<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <title>Leave Management</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background:#F3F4F6; color:#1F2937; -webkit-tap-highlight-color: transparent; }
    .card { background:#fff; border-radius: 1.25rem; border:1px solid #E5E7EB; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); padding: 1.1rem; }

    .input { background:#F9FAFB; border:1px solid #D1D5DB; border-radius:.9rem; padding:.85rem; width:100%; outline:none; transition:.2s; font-size:.95rem; color:#374151; }
    .input:focus { background:#fff; border-color:#3B82F6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
    .err { border-color:#EF4444 !important; background-color:#FEF2F2 !important; box-shadow:0 0 0 3px rgba(239,68,68,.15) !important; }

    .info-badge { font-size:11px; font-weight:700; background:#EFF6FF; color:#2563EB; padding:4px 12px; border-radius:9999px; border:1px solid #DBEAFE; display:inline-flex; align-items:center; white-space:nowrap; }

    .btn-disabled { opacity: .55; cursor: not-allowed; }
    ::-webkit-scrollbar { display: none; }

    /* Searchable dropdown (minimal, matches current style) */
    .dd-wrap { position: relative; }
    .dd-panel {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.12);
      overflow: hidden;
      z-index: 50;
    }
    .dd-item { padding: 12px 14px; cursor: pointer; }
    .dd-item:hover { background: #F9FAFB; }
    .dd-item.disabled { opacity: .45; cursor: not-allowed; }
    .dd-item.disabled:hover { background: #fff; }
    .dd-empty { padding: 14px; color:#9CA3AF; font-size: 12px; text-align:center; }
  </style>
</head>

<body class="pb-24 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col relative">

    <div class="bg-white px-6 pt-10 pb-4 rounded-b-3xl shadow-sm mb-5 relative z-10 border-b border-slate-100">
      <div class="flex items-center gap-4">
        <div id="avatarBox" class="w-12 h-12 rounded-full overflow-hidden border-2 border-white shadow-md ring-2 ring-blue-50 hidden">
          <img id="profileImg" src="" class="w-full h-full object-cover" alt="profile">
        </div>
        <div class="flex-1">
          <h1 id="title" class="text-2xl font-bold text-[#1F2937] tracking-tight">Welcome 👋</h1>
          <p id="subTitle" class="text-[#9CA3AF] text-sm font-medium mt-0.5 flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Loading...
          </p>
        </div>
        <span id="statusBadge" class="hidden info-badge">Status</span>
      </div>
    </div>

    <div class="px-5 space-y-5 flex-1" id="rootBox"></div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-[#F3F4F6] p-5 pb-[calc(1.25rem+env(safe-area-inset-bottom))] z-40" id="bottomBar">
      <button id="submitBtn" onclick="handleSubmit()"
        class="w-full bg-[#60A5FA] hover:bg-[#3B82F6] text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-200 active:scale-[0.98] transition-all">
        ลงทะเบียน
      </button>
    </div>

    <div id="loader" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50">
      <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-[180px] w-full">
        <div class="w-10 h-10 border-4 border-[#F3F4F6] border-t-[#3B82F6] rounded-full animate-spin mb-4"></div>
        <div class="font-bold text-[#1F2937] text-sm" id="loaderText">Processing...</div>
      </div>
    </div>
  </div>

<script>
  const LIFF_ID  = "2008997153-n5oIYKUP";
  const API_URL  = "https://script.google.com/macros/s/AKfycbxHUdtv3_rR84mci9crkOGR0IEZYpAt5LxOFrf5lqCQbgJ-JO45acJwivTEs0zQ9qyTcg/exec";
  const DEFAULT_RETURN = "index.html";

  const BOOT_CACHE_KEY = "leave_boot_v2";
  const BOOT_TTL_OK_MS = 3 * 60 * 1000;
  const BOOT_TTL_NOT_OK_MS = 20 * 1000;

  const $ = (id) => document.getElementById(id);

  let userProfile = null;
  let boot = null;
  let approverOptions = [];
  let selectedApproverUserId = "";

  function showLoader(msg){ $("loaderText").textContent = msg || "Processing..."; $("loader").classList.remove("hidden"); $("loader").classList.add("flex"); }
  function hideLoader(){ $("loader").classList.add("hidden"); $("loader").classList.remove("flex"); }

  function doneAndExit(){
    try {
      if (window.liff && liff.isInClient()) { liff.closeWindow(); return; }
    } catch(e) {}
    try { window.close(); } catch(e) {}
  }

  function escapeHtml_(s) {
    return String(s ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  function setHeader_(title, subtitle) {
    $("title").textContent = title || "Welcome 👋";
    $("subTitle").innerHTML = subtitle || "";
  }

  function setStatusBadge_(text) {
    const b = $("statusBadge");
    if (!text) { b.classList.add("hidden"); return; }
    b.textContent = text;
    b.classList.remove("hidden");
  }

  function getReturnUrl_() {
    const params = new URLSearchParams(location.search);
    const ret = params.get("return");
    return ret ? decodeURIComponent(ret) : DEFAULT_RETURN;
  }

  function goReturn_() {
    location.replace(getReturnUrl_());
  }

  function readBootCache_(userId){
    try{
      const raw = localStorage.getItem(BOOT_CACHE_KEY);
      if(!raw) return null;
      const obj = JSON.parse(raw);
      if(!obj || obj.userId !== userId) return null;

      const ttl = obj.onboarded ? BOOT_TTL_OK_MS : BOOT_TTL_NOT_OK_MS;
      if(Date.now() - (obj.ts||0) > ttl) return null;

      return obj.payload;
    }catch(e){ return null; }
  }

  function writeBootCache_(userId, payload){
    try{
      localStorage.setItem(BOOT_CACHE_KEY, JSON.stringify({
        userId,
        ts: Date.now(),
        onboarded: !!payload?.onboarded,
        payload
      }));
    }catch(e){}
  }

  async function apiBootstrap_(userId){
    const res = await fetch(API_URL + "?action=bootstrap&userId=" + encodeURIComponent(userId) + "&t=" + Date.now());
    return res.json();
  }

  async function postFormUrlEncoded_(obj) {
    const body = new URLSearchParams();
    Object.keys(obj || {}).forEach(k => body.set(k, obj[k] == null ? "" : String(obj[k])));
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
      body: body.toString()
    });
    return res.json();
  }

  function buildOptionLabel_(x) {
    if (!x) return "-";
    const fn = String(x.fullName || "").trim();
    const nn = String(x.nickname || "").trim();
    const dn = String(x.displayName || "").trim();

    if (fn && nn) return `${fn} (${nn})`;
    if (fn) return fn;
    if (nn) return nn;
    return dn || "-";
  }

  function normalizeStr_(s) {
    return String(s || "").toLowerCase().trim();
  }

  function matchesQuery_(opt, q) {
    const qq = normalizeStr_(q);
    if (!qq) return true;

    const a = normalizeStr_(opt.fullName);
    const b = normalizeStr_(opt.nickname);
    const c = normalizeStr_(opt.displayName);
    const d = normalizeStr_(opt.label);

    return a.includes(qq) || b.includes(qq) || c.includes(qq) || d.includes(qq);
  }

  function isFirstUser_() {
    return !!boot?.isFirstUser;
  }

  function existingEmployee_() {
    return boot?.employee && String(boot.employee.userId || "").trim() ? boot.employee : null;
  }

  function existingApproverUserId_() {
    return String(boot?.employee?.approverUserId || "").trim();
  }

  function setBtnDisabled_(disabled) {
    const btn = $("submitBtn");
    btn.disabled = !!disabled;
    btn.classList.toggle("btn-disabled", !!disabled);
  }

  function clearErr_(id, inputId) {
    const el = $(id);
    const inp = $(inputId);
    if (el) el.classList.add("hidden");
    if (inp) inp.classList.remove("err");
  }

  function showErr_(id, inputId, msg) {
    const el = $(id);
    const inp = $(inputId);
    if (el) { el.textContent = msg; el.classList.remove("hidden"); }
    if (inp) inp.classList.add("err");
    if (inp) {
      const once = function(){ clearErr_(id, inputId); inp.removeEventListener("input", once); };
      inp.addEventListener("input", once);
    }
  }

  function renderSystemError_(msg) {
    setHeader_("System Error", "Please try again");
    setStatusBadge_("");
    $("rootBox").innerHTML = `
      <div class="card text-center py-10">
        <div class="text-4xl mb-3">⚠️</div>
        <div class="text-lg font-bold text-[#1F2937]">System Error</div>
        <div class="text-sm text-[#9CA3AF] mt-2">${escapeHtml_(msg || "ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่อีกครั้ง")}</div>
        <button class="w-full mt-6 bg-[#60A5FA] hover:bg-[#3B82F6] shadow-lg shadow-blue-200 text-white py-3.5 rounded-2xl font-bold active:scale-[0.98] transition-all" onclick="location.reload()">Try Again</button>
        <button class="w-full mt-3 bg-white border border-[#E5E7EB] text-[#9CA3AF] py-3 rounded-2xl font-bold hover:bg-[#F9FAFB] transition-colors active:scale-[0.98]" onclick="doneAndExit()">Close</button>
      </div>
    `;
    $("bottomBar").classList.add("hidden");
  }

  function renderForm_() {
    const emp = existingEmployee_();
    const existingApprover = existingApproverUserId_();

    selectedApproverUserId = existingApprover; // prefill if exists

    setHeader_("Welcome 👋", `Hi, <span class="font-bold text-[#1F2937]">${escapeHtml_(userProfile?.displayName || "there")}</span>`);

    // status badge
    if (!emp) setStatusBadge_("New");
    else setStatusBadge_(existingApprover ? "Active" : (isFirstUser_() ? "First user" : "Incomplete"));

    const hint = isFirstUser_()
      ? `You can register without an approver to initialize the system. <span class="font-bold">You will not be able to submit leave until an approver is set.</span>`
      : `Approver selection is required to complete registration. Contact an admin if you need to change it later.`;

    $("rootBox").innerHTML = `
      <div class="card space-y-4">
        <div>
          <label class="text-sm font-bold text-[#1F2937] block mb-2">Full Name <span class="text-[#EF4444]">*</span></label>
          <input id="fullName" type="text" class="input" placeholder="Please enter your full name" value="${escapeHtml_(emp?.fullName || "")}" />
          <div id="nameErr" class="hidden text-xs text-[#EF4444] mt-2 font-bold"></div>
        </div>

        <div>
          <label class="text-sm font-bold text-[#1F2937] block mb-2">Nickname</label>
          <input id="nickname" type="text" class="input" placeholder="Please enter your nickname" value="${escapeHtml_(emp?.nickname || "")}" />
        </div>
      </div>

      <div class="space-y-2">
        <div class="flex justify-between items-center px-1 h-7">
          <label class="text-sm font-bold text-[#1F2937]">Approver ${isFirstUser_() ? "" : `<span class="text-[#EF4444]">*</span>`}</label>
        </div>

        <div class="dd-wrap">
          <input id="approverSearch" type="text" class="input" placeholder="Search approver name" autocomplete="off" />
          <input id="approverUserId" type="hidden" value="${escapeHtml_(selectedApproverUserId)}" />

          <div id="ddPanel" class="dd-panel hidden"></div>
          <div id="approverErr" class="hidden text-xs text-[#EF4444] mt-2 font-bold px-1"></div>
        </div>

        <div class="flex items-start gap-2 bg-[#F8FAFC] p-3 rounded-xl border border-[#F1F5F9]">
          <span class="text-[#3B82F6] mt-0.5">ℹ️</span>
          <div class="text-[11px] text-[#64748B] font-medium leading-relaxed">${hint}</div>
        </div>
      </div>
    `;

    $("bottomBar").classList.remove("hidden");
    $("submitBtn").textContent = "ลงทะเบียน";
    setBtnDisabled_(false);

    wireDropdown_();
    hydrateApproverInput_();
  }

  function filteredApprovers_(q) {
    const me = String(userProfile?.userId || "").trim();
    return (approverOptions || []).filter(o => {
      if (!o || !o.userId) return false;
      // frontend: must NOT allow selecting self
      if (String(o.userId).trim() === me) return false;
      return matchesQuery_(o, q);
    });
  }

  function hydrateApproverInput_() {
    const hidden = $("approverUserId");
    const search = $("approverSearch");
    const uid = String(hidden?.value || "").trim();
    if (!uid) { search.value = ""; return; }

    const opt = (approverOptions || []).find(x => String(x.userId) === uid);
    search.value = opt ? (opt.label || buildOptionLabel_(opt)) : "";
  }

  function renderDropdown_(q) {
    const panel = $("ddPanel");
    if (!panel) return;

    const list = filteredApprovers_(q);
    if (!list.length) {
      panel.innerHTML = `<div class="dd-empty">No approver found</div>`;
      return;
    }

    panel.innerHTML = list.map(o => {
      const label = escapeHtml_(o.label || buildOptionLabel_(o));
      const uid = escapeHtml_(o.userId);
      return `<div class="dd-item" data-uid="${uid}">${label}</div>`;
    }).join("");
  }

  function openDropdown_() {
    const panel = $("ddPanel");
    if (!panel) return;
    panel.classList.remove("hidden");
  }

  function closeDropdown_() {
    const panel = $("ddPanel");
    if (!panel) return;
    panel.classList.add("hidden");
  }

  function wireDropdown_() {
    const input = $("approverSearch");
    const panel = $("ddPanel");
    const hidden = $("approverUserId");

    if (!input || !panel || !hidden) return;

    input.addEventListener("focus", function() {
      renderDropdown_(input.value);
      openDropdown_();
    });

    input.addEventListener("input", function() {
      clearErr_("approverErr", "approverSearch");
      hidden.value = "";
      selectedApproverUserId = "";
      renderDropdown_(input.value);
      openDropdown_();
    });

    panel.addEventListener("click", function(ev) {
      const item = ev.target?.closest?.(".dd-item");
      if (!item) return;
      const uid = String(item.getAttribute("data-uid") || "");
      if (!uid) return;

      selectedApproverUserId = uid;
      hidden.value = uid;

      const opt = (approverOptions || []).find(x => String(x.userId) === uid);
      input.value = opt ? (opt.label || buildOptionLabel_(opt)) : "";

      closeDropdown_();
      clearErr_("approverErr", "approverSearch");
    });

    document.addEventListener("click", function(ev) {
      const wrap = ev.target?.closest?.(".dd-wrap");
      if (!wrap) closeDropdown_();
    });
  }

  function validateBeforeSubmit_() {
    const fullName = ($("fullName")?.value || "").trim();
    const approverUserId = String($("approverUserId")?.value || "").trim();

    if (!fullName) {
      showErr_("nameErr", "fullName", "Please enter your full name.");
      return false;
    }

    // non-first-user must choose approver
    if (!isFirstUser_() && !approverUserId) {
      showErr_("approverErr", "approverSearch", "Approver is required to complete registration.");
      return false;
    }

    // if user typed but did not select from list => hidden is blank
    if (!isFirstUser_() && !approverUserId) return false;

    return true;
  }

  async function handleSubmit() {
    try {
      if (!validateBeforeSubmit_()) return;

      const fullName = ($("fullName")?.value || "").trim();
      const nickname = ($("nickname")?.value || "").trim();
      const approverUserId = String($("approverUserId")?.value || "").trim();

      showLoader("Registering...");
      setBtnDisabled_(true);

      const data = await postFormUrlEncoded_({
        action: "register_user",
        userId: userProfile.userId,
        displayName: userProfile.displayName || "",
        fullName,
        nickname,
        approverUserId: approverUserId // may be blank for first user only
      });

      if (!data || !data.ok) {
        hideLoader();
        setBtnDisabled_(false);

        const errCode = String(data?.error || "unknown_error");
        if (errCode === "missing_fullName") {
          showErr_("nameErr", "fullName", "Please enter your full name.");
          return;
        }
        if (errCode === "missing_approverUserId") {
          showErr_("approverErr", "approverSearch", "Approver is required to complete registration.");
          return;
        }
        if (errCode === "approver_not_found") {
          showErr_("approverErr", "approverSearch", "Selected approver was not found. Please select again.");
          return;
        }
        if (errCode === "approver_inactive") {
          showErr_("approverErr", "approverSearch", "Selected approver is inactive. Please choose another.");
          return;
        }

        alert("❌ Save failed: " + errCode);
        return;
      }

      // update cache for index/remark usage
      writeBootCache_(userProfile.userId, {
        ok: true,
        onboarded: !!data.onboarded,
        isFirstUser: !!data.isFirstUser,
        employee: data.employee || null,
        approverOptions: approverOptions || [],
        holidays: boot?.holidays || [],
        balances: boot?.balances || []
      });

      hideLoader();
      $("bottomBar").classList.add("hidden");

      $("rootBox").innerHTML = `
        <div class="card text-center py-12 mt-8 border border-[#10B981] shadow-lg shadow-green-100">
          <div class="w-20 h-20 rounded-full bg-[#ECFDF5] flex items-center justify-center text-[#10B981] text-4xl mx-auto mb-4 animate-bounce">✅</div>
          <div class="text-xl font-bold text-[#1F2937]">Registration complete.</div>
        </div>
      `;

      // preferred: close in LIFF
      setTimeout(() => {
        try {
          if (window.liff && liff.isInClient()) { liff.closeWindow(); return; }
        } catch(e) {}
        goReturn_();
      }, 700);

    } catch (e) {
      hideLoader();
      setBtnDisabled_(false);
      alert("❌ Save failed: " + (e?.message || e));
    }
  }

  async function init() {
    showLoader("Loading...");
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) { liff.login(); return; }

    userProfile = await liff.getProfile();

    if (userProfile.pictureUrl) {
      $("profileImg").src = userProfile.pictureUrl;
      $("avatarBox").classList.remove("hidden");
    }

    setHeader_("Welcome 👋", `Hi, <span class="font-bold text-[#1F2937]">${escapeHtml_(userProfile.displayName || "")}</span>`);
    setStatusBadge_("Loading");

    // try cached boot first
    const cachedBoot = readBootCache_(userProfile.userId);
    if (cachedBoot && cachedBoot.ok) {
      boot = cachedBoot;
      approverOptions = Array.isArray(boot.approverOptions) ? boot.approverOptions : [];
      renderForm_();
      hideLoader();
    }

    // fetch fresh bootstrap
    try {
      const fresh = await apiBootstrap_(userProfile.userId);
      if (!fresh || !fresh.ok) throw new Error(String(fresh?.error || "bootstrap_failed"));

      boot = fresh;
      approverOptions = Array.isArray(boot.approverOptions) ? boot.approverOptions : [];
      writeBootCache_(userProfile.userId, boot);

      renderForm_();
      hideLoader();

    } catch (e) {
      hideLoader();
      if (!boot) renderSystemError_("ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่อีกครั้ง");
    }
  }

  init().catch(err => {
    console.error(err);
    hideLoader();
    renderSystemError_("LIFF Init Error: " + (err?.message || err));
  });
</script>
</body>
</html>
