<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <title>Leave Management</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background:#F3F4F6; color:#1F2937; -webkit-tap-highlight-color: transparent; }
    .card { background:#fff; border-radius: 1.25rem; border:1px solid #E5E7EB; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); padding: 1.1rem; }

    .input { background:#F9FAFB; border:1px solid #D1D5DB; border-radius:.9rem; padding:.85rem; width:100%; outline:none; transition:.2s; font-size:.95rem; color:#374151; }
    .input:focus { background:#fff; border-color:#3B82F6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
    .err { border-color:#EF4444 !important; background-color:#FEF2F2 !important; box-shadow:0 0 0 3px rgba(239,68,68,.15) !important; }

    .info-badge { font-size:11px; font-weight:700; background:#EFF6FF; color:#2563EB; padding:4px 12px; border-radius:9999px; border:1px solid #DBEAFE; display:inline-flex; align-items:center; white-space:nowrap; }

    .option-btn { width:100%; text-align:left; padding:.85rem 1rem; border:1px solid transparent; border-radius:1rem; background:#F9FAFB; color:#374151; transition:.2s; }
    .option-btn:active { transform: scale(.98); }
    .option-btn:hover { background:#F3F4F6; }
    .option-btn.selected { border-color:#3B82F6; background:#EFF6FF; box-shadow:0 4px 12px rgba(59,130,246,.12); }

    .dropdown-box { max-height: 280px; overflow:auto; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>

<body class="pb-24 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col relative">

    <div class="bg-white px-6 pt-10 pb-4 rounded-b-3xl shadow-sm mb-5 relative z-10 border-b border-slate-100">
      <div class="flex items-center gap-4">
        <div id="avatarBox" class="w-12 h-12 rounded-full overflow-hidden border-2 border-white shadow-md ring-2 ring-blue-50 hidden">
          <img id="profileImg" src="" class="w-full h-full object-cover" alt="profile">
        </div>
        <div class="flex-1">
          <h1 id="title" class="text-2xl font-bold text-[#1F2937] tracking-tight">Welcome 👋</h1>
          <p id="subTitle" class="text-[#9CA3AF] text-sm font-medium mt-0.5 flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Loading...
          </p>
        </div>
        <span id="statusBadge" class="hidden info-badge">-</span>
      </div>
    </div>

    <div class="px-5 space-y-5 flex-1" id="rootBox"></div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-[#F3F4F6] p-5 pb-[calc(1.25rem+env(safe-area-inset-bottom))] z-40" id="bottomBar">
      <button id="submitBtn" onclick="handleSubmit()"
        class="w-full bg-[#60A5FA] hover:bg-[#3B82F6] text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-200 active:scale-[0.98] transition-all">
        ลงทะเบียน
      </button>
    </div>

    <div id="loader" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50">
      <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-[180px] w-full">
        <div class="w-10 h-10 border-4 border-[#F3F4F6] border-t-[#3B82F6] rounded-full animate-spin mb-4"></div>
        <div class="font-bold text-[#1F2937] text-sm" id="loaderText">Processing...</div>
      </div>
    </div>
  </div>

<script>
  const LIFF_ID  = "2008997153-n5oIYKUP";
  const API_URL  = "https://script.google.com/macros/s/AKfycbxHUdtv3_rR84mci9crkOGR0IEZYpAt5LxOFrf5lqCQbgJ-JO45acJwivTEs0zQ9qyTcg/exec";

  const DEFAULT_RETURN = "index.html";

  const BOOT_CACHE_KEY = "leave_boot_v2";
  const SUCCESS_KEY = "leave_login_success_v2";

  const BOOT_TTL_OK_MS = 3 * 60 * 1000;
  const BOOT_TTL_NOT_OK_MS = 20 * 1000;

  const $ = (id) => document.getElementById(id);

  let userProfile = null;
  let bootPayload = null;
  let approverOptions = [];
  let filteredApprovers = [];
  let selectedApproverUserId = "";

  function showLoader(msg){ $("loaderText").textContent = msg || "Processing..."; $("loader").classList.remove("hidden"); $("loader").classList.add("flex"); }
  function hideLoader(){ $("loader").classList.add("hidden"); $("loader").classList.remove("flex"); }

  function doneAndExit(){
    try {
      if (window.liff && liff.isInClient()) {
        liff.closeWindow();
        return;
      }
    } catch(e) {}
    goReturn_();
  }

  function markSuccess_(){ try { sessionStorage.setItem(SUCCESS_KEY, "1"); } catch(e) {} }
  function wasSuccess_(){ try { return sessionStorage.getItem(SUCCESS_KEY) === "1"; } catch(e) { return false; } }
  function clearSuccess_(){ try { sessionStorage.removeItem(SUCCESS_KEY); } catch(e) {} }

  function escapeHtml_(s) {
    return String(s ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  function setHeader_(title, subtitle) {
    $("title").textContent = title || "Welcome 👋";
    $("subTitle").innerHTML = subtitle || "";
  }

  function setStatusBadge_(text) {
    const b = $("statusBadge");
    if (!text) {
      b.classList.add("hidden");
      return;
    }
    b.textContent = text;
    b.classList.remove("hidden");
  }

  function getReturnUrl_() {
    const params = new URLSearchParams(location.search);
    const ret = params.get("return");
    return ret ? decodeURIComponent(ret) : DEFAULT_RETURN;
  }

  function goReturn_() {
    location.replace(getReturnUrl_());
  }

  function readBootCache_(userId){
    try{
      const raw = localStorage.getItem(BOOT_CACHE_KEY);
      if(!raw) return null;
      const obj = JSON.parse(raw);
      if (!obj || obj.userId !== userId) return null;

      const ttl = obj.onboarded ? BOOT_TTL_OK_MS : BOOT_TTL_NOT_OK_MS;
      if (Date.now() - (obj.ts || 0) > ttl) return null;

      return obj.payload || null;
    } catch(e){
      return null;
    }
  }

  function writeBootCache_(userId, payload){
    try{
      localStorage.setItem(BOOT_CACHE_KEY, JSON.stringify({
        userId,
        ts: Date.now(),
        onboarded: !!payload?.onboarded,
        payload
      }));
    } catch(e){}
  }

  async function apiBootstrap_(userId){
    const res = await fetch(API_URL + "?action=bootstrap&userId=" + encodeURIComponent(userId) + "&t=" + Date.now());
    return res.json();
  }

  async function postFormUrlEncoded_(obj) {
    const body = new URLSearchParams();
    Object.keys(obj || {}).forEach(k => body.set(k, obj[k] == null ? "" : String(obj[k])));
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
      body: body.toString()
    });
    return res.json();
  }

  function filterApproverOptions_(keyword) {
    const q = String(keyword || "").trim().toLowerCase();
    const list = approverOptions.filter(x => String(x.userId || "") !== String(userProfile?.userId || ""));
    if (!q) return list;

    return list.filter(x => {
      const hay = [
        x.label,
        x.fullName,
        x.nickname,
        x.displayName
      ].map(v => String(v || "").toLowerCase()).join(" | ");
      return hay.indexOf(q) > -1;
    });
  }

  function renderApproverOptions_() {
    const box = $("approverOptionsBox");
    if (!box) return;

    if (!filteredApprovers.length) {
      box.innerHTML = `
        <div class="text-sm text-[#9CA3AF] text-center py-6">
          ไม่พบ Approver ที่ตรงกับคำค้นหา
        </div>
      `;
      return;
    }

    box.innerHTML = filteredApprovers.map(opt => {
      const selected = String(opt.userId) === String(selectedApproverUserId);
      return `
        <button type="button"
          class="option-btn ${selected ? "selected" : ""}"
          onclick="selectApprover_('${escapeHtml_(opt.userId)}')">
          <div class="text-sm font-bold text-[#1F2937]">${escapeHtml_(opt.label || "-")}</div>
          <div class="text-[11px] text-[#9CA3AF] mt-1 font-mono">${escapeHtml_(opt.userId || "")}</div>
        </button>
      `;
    }).join("");
  }

  function selectApprover_(userId) {
    selectedApproverUserId = String(userId || "");
    const picked = approverOptions.find(x => String(x.userId) === selectedApproverUserId);

    $("approverUserId").value = selectedApproverUserId;
    $("approverSearch").value = picked ? String(picked.label || "") : "";
    $("approverErr")?.classList.add("hidden");
    $("approverSearch")?.classList.remove("err");

    filteredApprovers = filterApproverOptions_($("approverSearch").value);
    renderApproverOptions_();
  }

  function onApproverSearchInput_() {
    selectedApproverUserId = "";
    $("approverUserId").value = "";
    $("approverErr")?.classList.add("hidden");
    $("approverSearch")?.classList.remove("err");

    filteredApprovers = filterApproverOptions_($("approverSearch").value);
    renderApproverOptions_();
  }

  function clearNameErr_() {
    $("nameErr")?.classList.add("hidden");
    $("fullName")?.classList.remove("err");
  }

  function showNameErr_() {
    $("nameErr")?.classList.remove("hidden");
    $("fullName")?.classList.add("err");
    $("fullName")?.addEventListener("input", clearNameErr_, { once: true });
  }

  function clearApproverErr_() {
    $("approverErr")?.classList.add("hidden");
    $("approverSearch")?.classList.remove("err");
  }

  function showApproverErr_() {
    $("approverErr")?.classList.remove("hidden");
    $("approverSearch")?.classList.add("err");
    $("approverSearch")?.addEventListener("input", clearApproverErr_, { once: true });
  }

  function renderForm_(boot) {
    const emp = boot?.employee || {};
    const isFirstUser = !!boot?.isFirstUser;
    const hasExisting = !!(emp && emp.userId);

    setHeader_(
      "Welcome 👋",
      `Hi, <span class="font-bold text-[#1F2937]">${escapeHtml_(userProfile?.displayName || "there")}</span>`
    );
    setStatusBadge_(isFirstUser ? "First user" : (hasExisting ? "Update" : "Register"));

    approverOptions = Array.isArray(boot?.approverOptions) ? boot.approverOptions : [];
    filteredApprovers = filterApproverOptions_("");
    selectedApproverUserId = String(emp?.approverUserId || "");

    const selectedLabel = approverOptions.find(x => String(x.userId) === selectedApproverUserId)?.label || "";

    $("rootBox").innerHTML = `
      <div class="card space-y-4">
        <div>
          <label class="text-sm font-bold text-[#1F2937] block mb-2">Full Name <span class="text-[#EF4444]">*</span></label>
          <input id="fullName" type="text" class="input" placeholder="Please enter your full name" value="${escapeHtml_(emp?.fullName || "")}" />
          <div id="nameErr" class="hidden text-xs text-[#EF4444] mt-2 font-bold">กรุณากรอกชื่อ-นามสกุล</div>
        </div>

        <div>
          <label class="text-sm font-bold text-[#1F2937] block mb-2">Nickname</label>
          <input id="nickname" type="text" class="input" placeholder="Please enter your nickname" value="${escapeHtml_(emp?.nickname || "")}" />
        </div>
      </div>

      <div class="space-y-3">
        <div class="flex justify-between items-center px-1 h-7">
          <label class="text-sm font-bold text-[#1F2937]">
            Approver ${isFirstUser ? "" : '<span class="text-[#EF4444]">*</span>'}
          </label>
        </div>

        <div class="card space-y-3">
          <input type="hidden" id="approverUserId" value="${escapeHtml_(selectedApproverUserId)}" />

          <div>
            <input
              id="approverSearch"
              type="text"
              class="input"
              placeholder="${isFirstUser ? 'Search approver (optional for first user)' : 'Search approver by name or nickname'}"
              value="${escapeHtml_(selectedLabel)}"
              oninput="onApproverSearchInput_()"
            />
            <div id="approverErr" class="hidden text-xs text-[#EF4444] mt-2 font-bold">กรุณาเลือก Approver ก่อนลงทะเบียน</div>
          </div>

          <div id="approverOptionsBox" class="dropdown-box space-y-2"></div>
        </div>

        ${
          isFirstUser
          ? `
            <div class="flex items-start gap-2 bg-[#F8FAFC] p-3 rounded-xl border border-[#F1F5F9]">
              <span class="text-[#3B82F6] mt-0.5">ℹ️</span>
              <div class="text-[11px] text-[#64748B] font-medium leading-relaxed">
                You are the first active user in this system, so you can complete registration without selecting an approver.
              </div>
            </div>
          `
          : `
            <div class="flex items-start gap-2 bg-[#F8FAFC] p-3 rounded-xl border border-[#F1F5F9]">
              <span class="text-[#3B82F6] mt-0.5">ℹ️</span>
              <div class="text-[11px] text-[#64748B] font-medium leading-relaxed">
                Please select your approver to complete onboarding.
              </div>
            </div>
          `
        }
      </div>
    `;

    renderApproverOptions_();
    $("bottomBar").classList.remove("hidden");
    $("submitBtn").textContent = "ลงทะเบียน";
    $("submitBtn").disabled = false;
  }

  function renderSystemError_(msg) {
    setHeader_("Something went wrong", "Please try again");
    setStatusBadge_("");
    $("rootBox").innerHTML = `
      <div class="card text-center py-10">
        <div class="text-4xl mb-3">⚠️</div>
        <div class="text-lg font-bold text-[#1F2937]">System Error</div>
        <div class="text-sm text-[#9CA3AF] mt-2">${escapeHtml_(msg || "ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่อีกครั้ง")}</div>
        <button class="w-full mt-6 bg-[#60A5FA] hover:bg-[#3B82F6] shadow-lg shadow-blue-200 text-white py-3.5 rounded-2xl font-bold active:scale-[0.98] transition-all" onclick="location.reload()">Try Again</button>
        <button class="w-full mt-3 bg-white border border-[#E5E7EB] text-[#9CA3AF] py-3 rounded-2xl font-bold hover:bg-[#F9FAFB] transition-colors active:scale-[0.98]" onclick="doneAndExit()">Close</button>
      </div>
    `;
    $("bottomBar").classList.add("hidden");
  }

  async function handleSubmit() {
    try {
      const fullName = ($("fullName")?.value || "").trim();
      const nickname = ($("nickname")?.value || "").trim();
      const approverUserId = ($("approverUserId")?.value || "").trim();

      if (!fullName) {
        showNameErr_();
        return;
      }

      if (!bootPayload?.isFirstUser && !approverUserId) {
        showApproverErr_();
        return;
      }

      showLoader("Registering...");
      $("submitBtn").disabled = true;

      const data = await postFormUrlEncoded_({
        action: "register_user",
        userId: userProfile.userId,
        displayName: userProfile.displayName || "",
        fullName,
        nickname,
        approverUserId
      });

      if (!data || !data.ok) {
        hideLoader();
        $("submitBtn").disabled = false;
        alert("❌ Save failed: " + String(data?.error || "unknown_error"));
        return;
      }

      writeBootCache_(userProfile.userId, {
        ok: true,
        onboarded: !!data.onboarded,
        isFirstUser: !!data.isFirstUser,
        employee: data.employee || null,
        approverOptions: data.approverOptions || []
      });

      hideLoader();
      markSuccess_();
      $("bottomBar").classList.add("hidden");

      $("rootBox").innerHTML = `
        <div class="card text-center py-12 mt-8 border border-[#10B981] shadow-lg shadow-green-100">
          <div class="w-20 h-20 rounded-full bg-[#ECFDF5] flex items-center justify-center text-[#10B981] text-4xl mx-auto mb-4 animate-bounce">✅</div>
          <div class="text-xl font-bold text-[#1F2937]">You’re all set!</div>
          <div class="text-sm text-[#9CA3AF] mt-2">Registration complete.</div>
        </div>
      `;

      setTimeout(() => doneAndExit(), 700);

    } catch (e) {
      hideLoader();
      $("submitBtn").disabled = false;
      alert("❌ Save failed: " + (e?.message || e));
    }
  }

  async function init() {
    showLoader("Loading...");
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    if (wasSuccess_()) {
      $("bottomBar").classList.add("hidden");
      $("rootBox").innerHTML = `
        <div class="card text-center py-12 mt-8 border border-[#10B981] shadow-lg shadow-green-100">
          <div class="w-20 h-20 rounded-full bg-[#ECFDF5] flex items-center justify-center text-[#10B981] text-4xl mx-auto mb-4">✅</div>
          <div class="text-xl font-bold text-[#1F2937]">You’re all set!</div>
          <div class="text-sm text-[#9CA3AF] mt-2">Registration complete.</div>
        </div>
      `;
      clearSuccess_();
      hideLoader();
      setTimeout(() => doneAndExit(), 500);
      return;
    }

    userProfile = await liff.getProfile();

    if (userProfile.pictureUrl) {
      $("profileImg").src = userProfile.pictureUrl;
      $("avatarBox").classList.remove("hidden");
    }

    const cached = readBootCache_(userProfile.userId);
    if (cached && cached.ok) {
      bootPayload = cached;

      if (bootPayload.onboarded) {
        hideLoader();
        goReturn_();
        return;
      }

      renderForm_(bootPayload);
      hideLoader();
    }

    let boot = null;
    try {
      showLoader("Checking access...");
      boot = await apiBootstrap_(userProfile.userId);
    } catch (e) {
      if (!cached) {
        hideLoader();
        renderSystemError_("ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่อีกครั้ง");
      }
      return;
    }

    if (!boot || !boot.ok) {
      hideLoader();
      renderSystemError_(boot?.error || "bootstrap_failed");
      return;
    }

    bootPayload = boot;
    writeBootCache_(userProfile.userId, bootPayload);

    if (bootPayload.onboarded) {
      hideLoader();
      goReturn_();
      return;
    }

    renderForm_(bootPayload);
    hideLoader();
  }

  init().catch(err => {
    console.error(err);
    hideLoader();
    renderSystemError_("LIFF Init Error: " + (err?.message || err));
  });
</script>
</body>
</html>
