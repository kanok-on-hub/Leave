<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <title>Leave Management</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background:#F3F4F6; color:#1F2937; -webkit-tap-highlight-color: transparent; }
    .card { background:#fff; border-radius: 1.25rem; border:1px solid #E5E7EB; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); padding: 1.1rem; }

    /* นำสไตล์ Input จากหน้า Index มาใช้คุมโทน */
    .input { background:#F9FAFB; border:1px solid #D1D5DB; border-radius:.9rem; padding:.85rem; width:100%; outline:none; transition:.2s; font-size:.95rem; color:#374151; }
    .input:focus { background:#fff; border-color:#F87171; box-shadow:0 0 0 3px rgba(248,113,113,.15); }
    .err { border-color:#EF4444 !important; background-color:#FEF2F2 !important; box-shadow:0 0 0 3px rgba(239,68,68,.15) !important; }

    .info-badge { font-size:11px; font-weight:700; background:#EFF6FF; color:#2563EB; padding:4px 12px; border-radius:9999px; border:1px solid #DBEAFE; display:inline-flex; align-items:center; white-space:nowrap; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>

<body class="pb-20 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col relative">

    <div class="bg-white px-6 pt-10 pb-6 rounded-b-3xl shadow-sm mb-6 relative z-10 border-b border-slate-100 text-center">
      <div>
        <h1 id="title" class="text-2xl font-bold text-[#1F2937] tracking-tight">Loading...</h1>
        <p id="subTitle" class="text-[#9CA3AF] text-sm font-medium mt-1">Please wait a moment</p>
      </div>
      <div class="mt-3 flex justify-center">
        <span id="roleBadge" class="hidden info-badge">Role: -</span>
      </div>
    </div>

    <div class="px-5 pb-24" id="rootBox"></div>

    <div id="loader" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50">
      <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-[180px] w-full">
        <div class="w-10 h-10 border-4 border-[#F3F4F6] border-t-[#3B82F6] rounded-full animate-spin mb-4"></div>
        <div class="font-bold text-[#1F2937] text-sm" id="loaderText">Processing...</div>
      </div>
    </div>
  </div>

<script>
  // ======= CONFIG =======
  const LIFF_ID = "2008997153-n5oIYKUP";
  const API_URL  = "https://script.google.com/macros/s/AKfycbxHUdtv3_rR84mci9crkOGR0IEZYpAt5LxOFrf5lqCQbgJ-JO45acJwivTEs0zQ9qyTcg/exec";
  const LOGIN_PAGE = "login.html";

  // localStorage cache for onboarding/role
  const ROLE_CACHE_KEY = "leave_onboard_v1";
  const ROLE_CACHE_TTL_MS = 24 * 60 * 60 * 1000; // 24h
  // ======================

  const $ = (id) => document.getElementById(id);

  function showLoader(msg){ $("loaderText").textContent = msg || "Processing..."; $("loader").classList.remove("hidden"); $("loader").classList.add("flex"); }
  function hideLoader(){ $("loader").classList.add("hidden"); $("loader").classList.remove("flex"); }
  function doneAndExit(){ try { liff.closeWindow(); } catch(e) {} }

  function escapeHtml_(s) {
    return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function escapeAttr_(s) { return escapeHtml_(s).replace(/`/g, "&#96;"); }

  function setRoleBadge_(role) {
    const b = $("roleBadge");
    if (!role) { b.classList.add("hidden"); return; }
    b.textContent = "Role: " + role;
    b.classList.remove("hidden");
  }

  // ---------- Onboarding cache ----------
  function readRoleCache_(userId) {
    try {
      const raw = localStorage.getItem(ROLE_CACHE_KEY);
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (!obj || obj.userId !== userId) return null;
      return obj;
    } catch(e) { return null; }
  }
  function writeRoleCache_(payload) {
    try { localStorage.setItem(ROLE_CACHE_KEY, JSON.stringify(payload || {})); } catch(e) {}
  }
  function isCacheFresh_(obj) {
    if (!obj || !obj.ts) return false;
    return (Date.now() - Number(obj.ts || 0)) <= ROLE_CACHE_TTL_MS;
  }

  async function apiCheckUser_(userId) {
    const res = await fetch(API_URL + "?action=check_user&userId=" + encodeURIComponent(userId) + "&t=" + Date.now());
    return res.json();
  }

  function redirectToLogin_() {
    const ret = location.pathname + location.search;
    const url = LOGIN_PAGE + "?return=" + encodeURIComponent(ret);
    location.replace(url);
  }

  function renderAccessDenied_(msg) {
    $("title").textContent = "Access Denied 🔒";
    $("subTitle").textContent = "This page is restricted";
    setRoleBadge_("");

    $("rootBox").innerHTML = `
      <div class="card text-center py-10">
        <div class="text-4xl mb-3">🔒</div>
        <div class="text-lg font-bold text-[#1F2937]">Access Denied</div>
        <div class="text-sm text-[#9CA3AF] mt-2">${escapeHtml_(msg || "ไม่สามารถใช้งานหน้านี้ได้")}</div>
        <button class="w-full mt-6 bg-[#60A5FA] hover:bg-[#3B82F6] shadow-lg shadow-blue-200 text-white py-3.5 rounded-2xl font-bold active:scale-[0.98] transition-all" onclick="doneAndExit()">Close</button>
      </div>`;
  }

  function renderNotFound_() {
    $("title").textContent = "Not Found";
    $("subTitle").textContent = "Error";
    setRoleBadge_("");
    $("rootBox").innerHTML = `
      <div class="card text-center py-10">
        <div class="text-4xl mb-3">📄❓</div>
        <div class="text-lg font-bold text-[#1F2937]">หาใบลาไม่เจอค่ะ</div>
        <div class="text-sm text-[#9CA3AF] mt-2">โปรดตรวจสอบลิงก์อีกครั้ง</div>
        <button class="w-full mt-6 bg-[#60A5FA] hover:bg-[#3B82F6] shadow-lg shadow-blue-200 text-white py-3.5 rounded-2xl font-bold active:scale-[0.98] transition-all" onclick="doneAndExit()">ปิดหน้าต่าง</button>
      </div>`;
  }

  // ✅ GUARD: กัน reject ถ้าไม่ใช่ SUBMITTED (กันทั้งเปิดหน้าและกดซ้ำ)
  function guardRemarkPage_(mode, req) {
    const st = String(req?.status || "").toUpperCase();

    if (mode === "reject") {
      if (st !== "SUBMITTED") {
        alert("แบบฟอร์มนี้ถูกยืนยันแล้ว");
        doneAndExit();
        return false;
      }
    }
    return true;
  }

  // 1. ฟังก์ชันทำ Req No สั้น
  function shortReqId(reqId) {
    const s = String(reqId || "");
    return "#" + (s.length <= 8 ? s : s.slice(-8));
  }

  // 2. ฟังก์ชันทำ Date Range สั้น (เหมือนใน GAS)
  function formatLeaveRangeShort(startVal, endVal) {
    if (!startVal || !endVal) return "-";
    const s = new Date(startVal);
    const e = new Date(endVal);
    if (isNaN(s) || isNaN(e)) return `${startVal} → ${endVal}`;

    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const sd = s.getDate(), sm = months[s.getMonth()], sy = s.getFullYear();
    const ed = e.getDate(), em = months[e.getMonth()], ey = e.getFullYear();

    if (s.getTime() === e.getTime() || (sd === ed && sm === em && sy === ey)) return `${sd} ${sm} ${sy}`;
    if (sm === em && sy === ey) return `${sd}-${ed} ${sm} ${sy}`;
    if (sy === ey) return `${sd} ${sm} - ${ed} ${em} ${sy}`;
    return `${sd} ${sm} ${String(sy).slice(-2)} - ${ed} ${em} ${String(ey).slice(-2)}`;
  }

  // Helper สำหรับสร้างบรรทัดข้อมูลเหมือน Flex (Label กว้างคงที่ ชิดซ้าย)
  function kvRow(label, valueHtml) {
    return `
      <div class="flex items-baseline space-x-3">
        <span class="text-[#9CA3AF] text-xs w-20 flex-shrink-0">${escapeHtml_(label)}</span>
        <span class="font-bold text-[#1F2937] text-sm break-words flex-1">${valueHtml}</span>
      </div>
    `;
  }

  async function getRequest_(requestId) {
    const res = await fetch(API_URL + "?action=get_request&requestId=" + encodeURIComponent(requestId) + "&t=" + Date.now());
    return res.json();
  }

  async function postFormUrlEncoded_(obj) {
    const body = new URLSearchParams();
    Object.keys(obj || {}).forEach(k => body.set(k, obj[k] == null ? "" : String(obj[k])));
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
      body: body.toString()
    });
    return res.json();
  }

  // === โหมด 1: พนักงานดูเหตุผลที่โดนปฏิเสธ ===
  function renderViewRemark_(req, requestId) {
    const remark = (req.remark || "").toString().trim() || "-";
    const shortReq = shortReqId(req.requestId || requestId);

    $("title").textContent = "Remark Details";
    $("subTitle").textContent = "เหตุผลที่ไม่อนุมัติ";
    setRoleBadge_("");

    $("rootBox").innerHTML = `
      <div class="card mb-5 text-center pt-6 pb-5">
         <div class="w-16 h-16 rounded-full bg-[#FFF0F2] flex items-center justify-center text-[#F43F5E] text-3xl mx-auto mb-3 shadow-inner">💬</div>
         <div class="font-bold text-[#1F2937] text-lg">รายการถูกปฏิเสธ</div>
         <div class="text-xs text-[#9CA3AF] mt-1 font-mono">Req No. ${escapeHtml_(shortReq)}</div>
      </div>

      <div class="bg-[#FFF5F5] border border-[#FEE2E2] rounded-xl p-4 mb-6">
        <div class="text-xs font-bold text-[#BE123C] mb-2">เหตุผลที่ไม่อนุมัติ:</div>
        <div class="text-sm text-[#9F1239] whitespace-pre-wrap leading-relaxed">${escapeHtml_(remark)}</div>
      </div>

      <button class="w-full bg-[#60A5FA] hover:bg-[#3B82F6] text-white py-4 rounded-2xl font-bold text-md transition-all shadow-lg shadow-blue-200 active:scale-[0.98]" onclick="doneAndExit()">ปิดหน้าต่าง</button>
    `;
  }

  // === โหมด 2: หัวหน้ากดปฏิเสธและกรอกเหตุผล ===
  function renderReject_(req, requestId) {
    const shortReq = shortReqId(req.requestId || requestId);
    const dateText = formatLeaveRangeShort(req.startDate, req.endDate);

    const attUrl = req.attachmentUrl ? String(req.attachmentUrl).trim() : "";
    const attachHtml = attUrl
      ? `<a href="${escapeAttr_(attUrl)}" target="_blank" class="text-[#2563EB] underline decoration-[#2563EB]">คลิกเพื่อดูไฟล์</a>`
      : `—`;

    $("title").textContent = "Reject Leave ❌";
    $("subTitle").textContent = "ไม่อนุมัติคำขอ";
    setRoleBadge_("Approver");

    $("rootBox").innerHTML = `
      <div class="card mb-5">
        <div class="text-center mb-4">
          <div class="text-4xl mb-2">📥</div>
          <div class="font-bold text-lg text-[#1F2937]">Pending Approval</div>
          <div class="text-xs font-bold text-[#FBBF24] mt-1">รออนุมัติ</div>
        </div>
        <hr class="border-[#F3F4F6] mb-4" />
        <div class="space-y-3 px-1">
          ${kvRow("Req No.", `<span class="font-mono">${escapeHtml_(shortReq)}</span>`)}
          ${kvRow("Name", escapeHtml_(req.name || "-"))}
          ${kvRow("Type", escapeHtml_(req.leaveType || "-"))}
          ${kvRow("Date", escapeHtml_(dateText))}
          ${kvRow("Days", escapeHtml_(String(req.leaveDays ?? "-")))}
          ${kvRow("Reason", escapeHtml_(req.reason || "-"))}
          ${kvRow("Attach", attachHtml)}
        </div>
      </div>

      <div class="space-y-2 mb-6 ml-1">
        <label class="block text-sm font-bold text-[#1F2937]">เหตุผลที่ไม่อนุมัติ <span class="text-[#EF4444]">*</span></label>
        <textarea id="rejectRemark" rows="3" class="input resize-none" placeholder="ระบุเหตุผลให้พนักงานทราบ"></textarea>

        <div id="remarkErr" class="hidden text-xs text-[#EF4444] mt-1.5 flex items-center font-bold">
          <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
          กรุณากรอกเหตุผลก่อนกดยืนยัน
        </div>
      </div>

      <div class="space-y-3">
        <button id="submitBtn" class="w-full bg-[#F87171] hover:bg-[#EF4444] text-white py-4 rounded-2xl font-bold text-md transition-all shadow-lg shadow-red-200 active:scale-[0.98]"
          onclick="submitReject_('${escapeAttr_(req.requestId || requestId)}')">ยืนยัน</button>
        <button class="w-full bg-white border border-[#E5E7EB] text-[#9CA3AF] py-3.5 rounded-2xl font-bold text-md hover:bg-[#F9FAFB] transition-colors active:scale-[0.98]"
          onclick="doneAndExit()">ยกเลิก</button>
      </div>`;
  }

  // ✅ Enforce Approver (blocking) before allowing reject submit
  async function ensureApproverReady_(profileUserId) {
    // Fast path: cache (optional)
    const cached = readRoleCache_(profileUserId);
    if (cached?.onboarded && String(cached.role || "").toLowerCase() === "approver" && isCacheFresh_(cached)) {
      setRoleBadge_("Approver");
      // Still verify with backend later at submit-time
      return { ok:true, role:"Approver", from:"cache" };
    }

    // Blocking check (for reject page)
    const r = await apiCheckUser_(profileUserId);
    if (!r || !r.ok) return { ok:false, error: String(r?.error || "check_user_failed") };

    if (!r.onboarded) {
      writeRoleCache_({ userId: profileUserId, onboarded:false, ts: Date.now() });
      return { ok:false, error:"not_onboarded" };
    }

    const role = String(r.role || "");
    writeRoleCache_({ userId: profileUserId, onboarded:true, role, name: String(r.name||""), ts: Date.now() });

    if (role.toLowerCase() !== "approver") return { ok:false, error:"role_mismatch", role };

    setRoleBadge_("Approver");
    return { ok:true, role:"Approver", from:"backend" };
  }

  async function submitReject_(requestId) {
    const ta = document.getElementById("rejectRemark");
    const err = document.getElementById("remarkErr");
    const btn = document.getElementById("submitBtn");

    const remark = (ta?.value || "").trim();

    if (!remark) {
      err?.classList.remove("hidden");
      ta?.classList.add("err");

      ta.addEventListener('input', function() {
        err?.classList.add("hidden");
        ta?.classList.remove("err");
      }, { once: true });
      return;
    }

    try {
      showLoader("Verifying...");
      if (btn) btn.disabled = true;

      const profile = await liff.getProfile();

      // ✅ Approver role enforcement (blocking)
      const gate = await ensureApproverReady_(profile.userId);
      if (!gate.ok) {
        hideLoader();
        if (btn) btn.disabled = false;

        if (gate.error === "not_onboarded") {
          alert("กรุณา Login / Setup ก่อนใช้งานค่ะ");
          redirectToLogin_();
          return;
        }
        if (gate.error === "role_mismatch") {
          renderAccessDenied_("บัญชีของคุณลงทะเบียนเป็น " + (gate.role || "Requester") + " จึงไม่สามารถปฏิเสธใบลาได้");
          return;
        }
        alert("ไม่สามารถตรวจสอบสิทธิ์ได้ กรุณาลองใหม่อีกครั้งค่ะ");
        return;
      }

      // ✅ Guard ซ้ำ: ดึงสถานะล่าสุดก่อน reject (กันเปิดค้างแล้วมีคนอนุมัติ/ปฏิเสธไปก่อน)
      showLoader("Checking status...");
      const latest = await getRequest_(requestId);
      const latestStatus = String(latest?.request?.status || "").toUpperCase();
      if (latestStatus !== "SUBMITTED") {
        hideLoader();
        alert("คำขอนี้ถูกดำเนินการแล้ว จึงไม่สามารถปฏิเสธซ้ำได้ค่ะ 🙂");
        doneAndExit();
        return;
      }

      showLoader("Saving...");
      const data = await postFormUrlEncoded_({
        action: "reject_leave",
        requestId,
        actorUserId: profile.userId,
        remark
      });

      if (!data || !data.ok) {
        throw new Error(data?.error || "ระบบขัดข้อง กรุณาลองใหม่");
      }

      await liff.sendMessages([{ type: "text", text: "LEAVE_REJECTED:" + requestId }]);

      hideLoader();

      $("rootBox").innerHTML = `
        <div class="card text-center py-12 mt-10 border border-[#10B981] shadow-lg shadow-green-100">
          <div class="w-20 h-20 rounded-full bg-[#ECFDF5] flex items-center justify-center text-[#10B981] text-4xl mx-auto mb-4 animate-bounce">✅</div>
          <div class="text-xl font-bold text-[#1F2937]">Saved Successfully</div>
        </div>
      `;

      setTimeout(() => doneAndExit(), 1500);

    } catch (e) {
      hideLoader();
      if (btn) btn.disabled = false;
      alert("❌ ไม่สามารถทำรายการได้: " + (e?.message || e));
    }
  }

  async function init() {
    showLoader("Loading...");
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) { liff.login(); return; }

    const params = new URLSearchParams(location.search);
    const mode = params.get("mode");
    const requestId = params.get("requestId");

    if (!mode || !requestId) {
      hideLoader();
      renderNotFound_();
      return;
    }

    // Fetch request
    let req = null;
    try {
      const data = await getRequest_(requestId);
      if (data && data.ok && data.request) req = data.request;
    } catch(e) {}

    hideLoader();

    if (!req) return renderNotFound_();

    // Status guard (reject requires SUBMITTED)
    if (!guardRemarkPage_(mode, req)) return;

    // For reject page, enforce onboarding+Approver role (blocking here to avoid showing form then closing)
    if (mode === "reject") {
      try {
        const profile = await liff.getProfile();

        // Fast cache check: if cache says Requester -> deny immediately
        const cached = readRoleCache_(profile.userId);
        if (cached?.onboarded && String(cached.role || "").toLowerCase() === "requester" && isCacheFresh_(cached)) {
          renderAccessDenied_("บัญชีของคุณลงทะเบียนเป็น Requester จึงไม่สามารถปฏิเสธใบลาได้");
          return;
        }

        showLoader("Verifying...");
        const gate = await ensureApproverReady_(profile.userId);
        hideLoader();

        if (!gate.ok) {
          if (gate.error === "not_onboarded") {
            alert("กรุณา Login / Setup ก่อนใช้งานค่ะ");
            redirectToLogin_();
            return;
          }
          if (gate.error === "role_mismatch") {
            renderAccessDenied_("บัญชีของคุณลงทะเบียนเป็น " + (gate.role || "Requester") + " จึงไม่สามารถปฏิเสธใบลาได้");
            return;
          }
          renderAccessDenied_("ไม่สามารถตรวจสอบสิทธิ์ได้ กรุณาลองใหม่อีกครั้งค่ะ");
          return;
        }
      } catch(e) {
        hideLoader();
        renderAccessDenied_("ไม่สามารถตรวจสอบสิทธิ์ได้ กรุณาลองใหม่อีกครั้งค่ะ");
        return;
      }

      return renderReject_(req, requestId);
    }

    // view_remark does not require role enforcement (optional)
    if (mode === "view_remark") return renderViewRemark_(req, requestId);

    renderNotFound_();
  }

  init().catch(err => {
    console.error(err);
    hideLoader();
    renderAccessDenied_("LIFF Init Error: " + (err.message || err));
  });
</script>
</body>
</html>
