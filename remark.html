<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <title>Leave Management</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background:#F3F4F6; color:#1F2937; -webkit-tap-highlight-color: transparent; }
    .card { background:#fff; border-radius: 1.25rem; border:1px solid #E5E7EB; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); padding: 1.1rem; }

    .input { background:#F9FAFB; border:1px solid #D1D5DB; border-radius:.9rem; padding:.85rem; width:100%; outline:none; transition:.2s; font-size:.95rem; color:#374151; }
    .input:focus { background:#fff; border-color:#F87171; box-shadow:0 0 0 3px rgba(248,113,113,.15); }
    .err { border-color:#EF4444 !important; background-color:#FEF2F2 !important; box-shadow:0 0 0 3px rgba(239,68,68,.15) !important; }

    ::-webkit-scrollbar { display: none; }
  </style>
</head>

<body class="pb-20 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col relative">

    <div class="bg-white px-6 pt-10 pb-4 rounded-b-3xl shadow-sm mb-5 relative z-10 border-b border-slate-100">
      <div class="flex items-center gap-4">
        <div id="avatarBox" class="w-12 h-12 rounded-full overflow-hidden border-2 border-white shadow-md ring-2 ring-blue-50 hidden">
          <img id="profileImg" src="" class="w-full h-full object-cover" alt="profile">
        </div>
        <div class="flex-1">
          <h1 id="title" class="text-2xl font-bold text-[#1F2937] tracking-tight">Loading...</h1>
          <p id="subTitle" class="text-[#9CA3AF] text-sm font-medium mt-0.5 flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Please wait a moment
          </p>
        </div>
      </div>
    </div>

    <div class="px-5 pb-24" id="rootBox"></div>

    <div id="loader" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50">
      <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-[180px] w-full">
        <div class="w-10 h-10 border-4 border-[#F3F4F6] border-t-[#3B82F6] rounded-full animate-spin mb-4"></div>
        <div class="font-bold text-[#1F2937] text-sm" id="loaderText">Processing...</div>
      </div>
    </div>
  </div>

<script>
  const LIFF_ID = "2008997153-n5oIYKUP";
  const API_URL = "https://script.google.com/macros/s/AKfycbxHUdtv3_rR84mci9crkOGR0IEZYpAt5LxOFrf5lqCQbgJ-JO45acJwivTEs0zQ9qyTcg/exec";
  const LOGIN_PAGE = "login.html";

  const BOOT_CACHE_KEY = "leave_boot_v2";
  const BOOT_TTL_OK_MS = 3 * 60 * 1000;
  const BOOT_TTL_NOT_OK_MS = 20 * 1000;

  const $ = (id) => document.getElementById(id);

  function showLoader(msg){ $("loaderText").textContent = msg || "Loading..."; $("loader").classList.remove("hidden"); $("loader").classList.add("flex"); }
  function hideLoader(){ $("loader").classList.add("hidden"); $("loader").classList.remove("flex"); }

  function doneAndExit(){
    try {
      if (window.liff && liff.isInClient()) {
        liff.closeWindow();
        return;
      }
    } catch(e) {}
    try { window.close(); } catch(e) {}
  }

  function escapeHtml_(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function escapeAttr_(s) { return escapeHtml_(s).replace(/`/g, "&#96;"); }

  function readBootCache_(userId){
    try{
      const raw = localStorage.getItem(BOOT_CACHE_KEY);
      if(!raw) return null;
      const obj = JSON.parse(raw);
      if(!obj || obj.userId !== userId) return null;

      const ttl = obj.onboarded ? BOOT_TTL_OK_MS : BOOT_TTL_NOT_OK_MS;
      if(Date.now() - (obj.ts||0) > ttl) return null;

      return obj.payload;
    }catch(e){ return null; }
  }

  function writeBootCache_(userId, payload){
    try{
      localStorage.setItem(BOOT_CACHE_KEY, JSON.stringify({
        userId,
        ts: Date.now(),
        onboarded: !!payload?.onboarded,
        payload
      }));
    }catch(e){}
  }

  async function apiBootstrap_(userId){
    const res = await fetch(API_URL + "?action=bootstrap&userId=" + encodeURIComponent(userId) + "&t=" + Date.now());
    return res.json();
  }

  async function apiGetRequestBundle_(requestId) {
    const res = await fetch(API_URL + "?action=get_request_bundle&requestId=" + encodeURIComponent(requestId));
    return res.json();
  }

  async function apiGetRequestFresh_(requestId) {
    const res = await fetch(API_URL + "?action=get_request&requestId=" + encodeURIComponent(requestId) + "&t=" + Date.now());
    return res.json();
  }

  async function postFormUrlEncoded_(obj) {
    const body = new URLSearchParams();
    Object.keys(obj || {}).forEach(k => body.set(k, obj[k] == null ? "" : String(obj[k])));
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
      body: body.toString()
    });
    return res.json();
  }

  function redirectToLogin_() {
    const ret = location.pathname + location.search;
    location.replace(LOGIN_PAGE + "?return=" + encodeURIComponent(ret));
  }

  function renderSystemError_(msg) {
    $("title").textContent = "System Error";
    $("subTitle").textContent = "Please try again";
    $("rootBox").innerHTML = `
      <div class="card text-center py-10">
        <div class="text-4xl mb-3">⚠️</div>
        <div class="text-lg font-bold text-[#1F2937]">System Error</div>
        <div class="text-sm text-[#9CA3AF] mt-2">${escapeHtml_(msg || "ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่อีกครั้ง")}</div>
        <button class="w-full mt-6 bg-[#60A5FA] hover:bg-[#3B82F6] shadow-lg shadow-blue-200 text-white py-3.5 rounded-2xl font-bold active:scale-[0.98] transition-all" onclick="location.reload()">Try Again</button>
        <button class="w-full mt-3 bg-white border border-[#E5E7EB] text-[#9CA3AF] py-3 rounded-2xl font-bold hover:bg-[#F9FAFB] transition-colors active:scale-[0.98]" onclick="doneAndExit()">Close</button>
      </div>`;
  }

  function renderNotFound_() {
    $("title").textContent = "Not Found";
    $("subTitle").textContent = "Error";
    $("rootBox").innerHTML = `
      <div class="card text-center py-10">
        <div class="text-4xl mb-3">📄❓</div>
        <div class="text-lg font-bold text-[#1F2937]">หาใบลาไม่เจอค่ะ</div>
        <div class="text-sm text-[#9CA3AF] mt-2">โปรดตรวจสอบลิงก์อีกครั้ง</div>
        <button class="w-full mt-6 bg-[#60A5FA] hover:bg-[#3B82F6] shadow-lg shadow-blue-200 text-white py-3.5 rounded-2xl font-bold active:scale-[0.98] transition-all" onclick="doneAndExit()">ปิดหน้าต่าง</button>
      </div>`;
  }

  function shortReqId_(reqId) {
    const s = String(reqId || "");
    return "#" + (s.length <= 8 ? s : s.slice(-8));
  }

  function formatLeaveRangeShort_(startVal, endVal) {
    if (!startVal || !endVal) return "-";
    const s = new Date(startVal);
    const e = new Date(endVal);
    if (isNaN(s) || isNaN(e)) return `${startVal} → ${endVal}`;

    const mTH = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

    const sd = s.getDate(), sm = mTH[s.getMonth()], sy = s.getFullYear() + 543;
    const ed = e.getDate(), em = mTH[e.getMonth()], ey = e.getFullYear() + 543;

    const sameDay = (s.getFullYear() === e.getFullYear() && s.getMonth() === e.getMonth() && s.getDate() === e.getDate());

    if (sameDay) return `${sd} ${sm} ${sy}`;
    if (sm === em && sy === ey) return `${sd}-${ed} ${sm} ${sy}`;
    if (sy === ey) return `${sd} ${sm} - ${ed} ${em} ${sy}`;
    return `${sd} ${sm} ${sy} - ${ed} ${em} ${ey}`;
  }

  function formatFullNameNick_(fullName, nickname){
    const fn = String(fullName || "").trim();
    const nn = String(nickname || "").trim();
    if (!fn && !nn) return "-";
    if (fn && nn) return `${fn} (${nn})`;
    return fn || nn;
  }

  function displayLeaveType_(req) {
    const t = String(req?.leaveType || "").trim();
    const other = String(req?.otherSpecify || "").trim();

    if (t === "Sick") return "ลาป่วย";
    if (t === "Annual") return "ลาพักร้อน";
    if (t === "Personal") return "ลากิจ";
    if (t === "Other") return other || "อื่นๆ";
    return t || "-";
  }

  function displayDayPart_(dayPart) {
    const dp = String(dayPart || "").trim();
    if (dp === "Full Day") return "เต็มวัน";
    if (dp === "Morning") return "ครึ่งวันเช้า";
    if (dp === "Afternoon") return "ครึ่งวันบ่าย";
    return dp || "-";
  }

  function kvRow_(label, valueHtml) {
    return `
      <div class="flex items-baseline space-x-3">
        <span class="text-[#9CA3AF] text-xs w-20 flex-shrink-0">${escapeHtml_(label)}</span>
        <span class="font-bold text-[#1F2937] text-sm break-words flex-1">${valueHtml}</span>
      </div>`;
  }

  function guardRejectStatus_(req) {
    const st = String(req?.status || "").toUpperCase();
    if (st !== "SUBMITTED") {
      alert("แบบฟอร์มนี้ไม่อยู่ในสถานะรออนุมัติแล้ว");
      doneAndExit();
      return false;
    }
    return true;
  }

  function renderViewRemark_(req, requesterPerson) {
    const remark = String(req.remark || "").trim() || "-";
    const shortReq = shortReqId_(req.requestId);

    const lineName = String(req.name || "-");
    const fullNameNick = formatFullNameNick_(requesterPerson?.fullName, requesterPerson?.nickname);

    $("title").textContent = "Remark Details 💬";

    $("rootBox").innerHTML = `
      <div class="card mb-5 text-center pt-6 pb-5">
         <div class="w-16 h-16 rounded-full bg-[#FFF0F2] flex items-center justify-center text-[#F43F5E] text-3xl mx-auto mb-3 shadow-inner">💬</div>
         <div class="font-bold text-[#1F2937] text-lg">รายการถูกปฏิเสธ</div>
         <div class="text-xs text-[#9CA3AF] mt-1 font-mono">Req No. ${escapeHtml_(shortReq)}</div>
      </div>

      <div class="card mb-5">
        <div class="space-y-3 px-1">
          ${kvRow_("Line", escapeHtml_(lineName))}
          ${kvRow_("Name", escapeHtml_(fullNameNick))}
        </div>
      </div>

      <div class="bg-[#FFF5F5] border border-[#FEE2E2] rounded-xl p-4 mb-6">
        <div class="text-xs font-bold text-[#BE123C] mb-2">Rejection reason:</div>
        <div class="text-sm text-[#9F1239] whitespace-pre-wrap leading-relaxed">${escapeHtml_(remark)}</div>
      </div>

      <button class="w-full bg-[#60A5FA] hover:bg-[#3B82F6] text-white py-4 rounded-2xl font-bold text-md transition-all shadow-lg shadow-blue-200 active:scale-[0.98]" onclick="doneAndExit()">ปิดหน้าต่าง</button>
    `;
  }

  function renderReject_(req, requesterPerson) {
    const shortReq = shortReqId_(req.requestId);
    const dateText = formatLeaveRangeShort_(req.startDate, req.endDate);
    const leaveType = displayLeaveType_(req);
    const dayPart = displayDayPart_(req.dayPart);

    const attUrl = req.attachmentUrl ? String(req.attachmentUrl).trim() : "";
    const attachHtml = attUrl
      ? `<a href="${escapeAttr_(attUrl)}" target="_blank" class="text-[#2563EB] underline decoration-[#2563EB]">คลิกเพื่อดูไฟล์</a>`
      : `—`;

    const lineName = String(req.name || "-");
    const fullNameNick = formatFullNameNick_(requesterPerson?.fullName, requesterPerson?.nickname);

    $("title").textContent = "Reject Leave Request ❌";

    $("rootBox").innerHTML = `
      <div class="card mb-5">
        <div class="text-center mb-4">
          <div class="text-4xl mb-2">📥</div>
          <div class="font-bold text-lg text-[#1F2937]">Pending Approval</div>
          <div class="text-xs font-bold text-[#FBBF24] mt-1">รออนุมัติ</div>
        </div>
        <hr class="border-[#F3F4F6] mb-4" />
        <div class="space-y-3 px-1">
          ${kvRow_("Req No.", `<span class="font-mono">${escapeHtml_(shortReq)}</span>`)}
          ${kvRow_("Line", escapeHtml_(lineName))}
          ${kvRow_("Name", escapeHtml_(fullNameNick))}
          ${kvRow_("Type", escapeHtml_(leaveType))}
          ${kvRow_("Date", escapeHtml_(dateText))}
          ${kvRow_("Duration", escapeHtml_(dayPart))}
          ${kvRow_("Days", escapeHtml_(`${req.leaveDays ?? "-"} วัน`))}
          ${kvRow_("Reason", escapeHtml_(req.reason || "-"))}
          ${kvRow_("Attach", attachHtml)}
        </div>
      </div>

      <div class="space-y-2 mb-6 ml-1">
        <label class="block text-sm font-bold text-[#1F2937]">Rejection reason <span class="text-[#EF4444]">*</span></label>
        <textarea id="rejectRemark" rows="3" class="input resize-none" placeholder="Please provide a reason for rejection"></textarea>

        <div id="remarkErr" class="hidden text-xs text-[#EF4444] mt-1.5 flex items-center font-bold">
          <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
          กรุณากรอกเหตุผลที่ไม่อนุมัติ
        </div>
      </div>

      <div class="space-y-3">
        <button id="submitBtn" class="w-full bg-[#F87171] hover:bg-[#EF4444] text-white py-4 rounded-2xl font-bold text-md transition-all shadow-lg shadow-red-200 active:scale-[0.98]"
          onclick="submitReject_('${escapeAttr_(req.requestId)}')">ยืนยัน</button>
      </div>`;
  }

  async function submitReject_(requestId) {
    const ta = document.getElementById("rejectRemark");
    const err = document.getElementById("remarkErr");
    const btn = document.getElementById("submitBtn");
    const remark = (ta?.value || "").trim();

    if (!remark) {
      err?.classList.remove("hidden");
      ta?.classList.add("err");
      ta.addEventListener('input', function() {
        err?.classList.add("hidden");
        ta?.classList.remove("err");
      }, { once: true });
      return;
    }

    try {
      showLoader("Rejecting...");
      if (btn) btn.disabled = true;

      const profile = await liff.getProfile();

      const latest = await apiGetRequestFresh_(requestId);
      const st = String(latest?.request?.status || "").toUpperCase();
      if (st !== "SUBMITTED") {
        hideLoader();
        alert("แบบฟอร์มนี้ไม่อยู่ในสถานะรออนุมัติแล้ว");
        doneAndExit();
        return;
      }

      const data = await postFormUrlEncoded_({
        action: "reject_leave",
        requestId,
        actorUserId: profile.userId,
        remark
      });

      if (!data || !data.ok) {
        hideLoader();
        if (btn) btn.disabled = false;

        const errCode = String(data?.error || "unknown_error");

        if (errCode === "not_onboarded" || errCode === "registration_incomplete") {
          alert("Please complete your registration before submitting leave.");
          redirectToLogin_();
          return;
        }
        if (errCode === "not_authorized") {
          alert("คุณไม่มีสิทธิ์ปฏิเสธใบลานี้ค่ะ");
          doneAndExit();
          return;
        }
        if (errCode === "invalid_status") {
          alert("แบบฟอร์มนี้ไม่อยู่ในสถานะรออนุมัติแล้ว");
          doneAndExit();
          return;
        }

        alert("❌ ไม่สามารถทำรายการได้: " + errCode);
        return;
      }

      await liff.sendMessages([{ type: "text", text: "LEAVE_REJECTED:" + requestId }]);

      hideLoader();
      $("rootBox").innerHTML = `
        <div class="card text-center py-12 mt-10 border border-[#10B981] shadow-lg shadow-green-100">
          <div class="w-20 h-20 rounded-full bg-[#ECFDF5] flex items-center justify-center text-[#10B981] text-4xl mx-auto mb-4 animate-bounce">✅</div>
          <div class="text-xl font-bold text-[#1F2937]">Rejected</div>
        </div>
      `;
      setTimeout(() => doneAndExit(), 1200);

    } catch (e) {
      hideLoader();
      if (btn) btn.disabled = false;
      alert("❌ ไม่สามารถทำรายการได้: " + (e?.message || e));
    }
  }

  async function init() {
    showLoader("Loading...");

    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const params = new URLSearchParams(location.search);
    const mode = params.get("mode");
    const requestId = params.get("requestId");
    if (!mode || !requestId) { hideLoader(); renderNotFound_(); return; }

    let profile = null;
    try { profile = await liff.getProfile(); } catch(e) {}

    if (profile) {
      $("subTitle").innerHTML = `Hi, <span class="font-bold text-[#1F2937]">${escapeHtml_(profile.displayName || "")}</span>`;
      if (profile.pictureUrl) {
        $("profileImg").src = profile.pictureUrl;
        $("avatarBox").classList.remove("hidden");
      }
    }

    // --- onboarding/access gate (must be registration complete) ---
    if (profile && profile.userId) {
      const cachedBoot = readBootCache_(profile.userId);
      if (cachedBoot && cachedBoot.ok && cachedBoot.onboarded === false) {
        hideLoader();
        redirectToLogin_();
        return;
      }

      let boot = null;
      try { boot = await apiBootstrap_(profile.userId); }
      catch (e) {
        hideLoader();
        renderSystemError_("ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่อีกครั้ง");
        return;
      }

      if (!boot || !boot.ok) {
        hideLoader();
        renderSystemError_("ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่อีกครั้ง");
        return;
      }

      writeBootCache_(profile.userId, boot);

      if (!boot.onboarded) {
        hideLoader();
        redirectToLogin_();
        return;
      }
    }
    // -------------------------------------------------------------

    const data = await apiGetRequestBundle_(requestId);
    if (!data || !data.ok || !data.request) { hideLoader(); renderNotFound_(); return; }

    const req = data.request;
    const requesterPerson = data.requesterPerson || {};

    if (mode === "view_remark") {
      hideLoader();
      renderViewRemark_(req, requesterPerson);
      return;
    }

    if (mode === "reject") {
      if (!guardRejectStatus_(req)) { hideLoader(); return; }
      hideLoader();
      renderReject_(req, requesterPerson);
      return;
    }

    hideLoader();
    renderNotFound_();
  }

  init().catch(err => {
    console.error(err);
    hideLoader();
    renderSystemError_("LIFF Init Error: " + (err?.message || err));
  });
</script>
</body>
</html>
