<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <title>Leave Management</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background:#F3F4F6; color:#1F2937; -webkit-tap-highlight-color: transparent; }
    .card { background:#fff; border-radius: 1rem; border:1px solid #E5E7EB; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); padding: 1.25rem; }
    
    /* สไตล์สำหรับแถวข้อมูล 4:7 เหมือน Flex */
    .kv-row { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 0.75rem; }
    .kv-label { flex: 4; color: #9CA3AF; font-size: 0.75rem; }
    .kv-value { flex: 7; color: #1F2937; font-size: 0.75rem; font-weight: 700; text-align: right; word-break: break-word; }
    
    ::-webkit-scrollbar { display: none; }
  </style>
</head>

<body class="pb-20 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col relative">
    
    <div class="bg-white px-6 pt-10 pb-6 rounded-b-3xl shadow-sm mb-6 border-b border-slate-100 text-center">
      <h1 id="title" class="text-2xl font-bold text-[#1F2937] tracking-tight">Loading...</h1>
      <p id="subTitle" class="text-[#9CA3AF] text-sm font-medium mt-1">Please wait</p>
    </div>

    <div class="px-5 pb-24" id="rootBox"></div>

    <div id="loader" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50">
      <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-[180px] w-full">
        <div class="w-10 h-10 border-4 border-[#F3F4F6] border-t-[#3B82F6] rounded-full animate-spin mb-4"></div>
        <div class="font-bold text-[#1F2937] text-sm" id="loaderText">Processing...</div>
      </div>
    </div>
  </div>

<script>
  // ======= CONFIG =======
  const LIFF_ID = "2008997153-n5oIYKUP";
  const API_URL  = "https://script.google.com/macros/s/AKfycbzDaipJG7WIM8Qp-PhnVEpACZsXM86Q_dYWgxAVM3wWg-VtPp4LocgI2zbYquIFO7WW/exec";
  // ======================

  const $ = (id) => document.getElementById(id);

  // --- Utility Functions ---
  function shortReqId(id) {
    const s = String(id || "");
    return s.length > 8 ? "#" + s.slice(-8) : "#" + s;
  }

  function formatLeaveRangeShort(startVal, endVal) {
    if (!startVal || !endVal) return "-";
    const s = new Date(startVal);
    const e = new Date(endVal);
    if (isNaN(s) || isNaN(e)) return "-";

    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const sd = s.getDate(), ed = e.getDate();
    const sm = months[s.getMonth()], em = months[e.getMonth()];
    const sy = s.getFullYear(), ey = e.getFullYear();

    if (s.toDateString() === e.toDateString()) return `${sd} ${sm} ${sy}`;
    if (sm === em && sy === ey) return `${sd}-${ed} ${sm} ${sy}`;
    if (sy === ey) return `${sd} ${sm} - ${ed} ${em} ${sy}`;
    return `${sd} ${sm} ${String(sy).slice(-2)} - ${ed} ${em} ${String(ey).slice(-2)}`;
  }

  function renderDataRow(label, value, isLink = false, linkUrl = "") {
    let valueHtml = isLink 
      ? `<a href="${linkUrl}" class="text-[#2563EB] underline">${value}</a>` 
      : value;
    return `
      <div class="kv-row">
        <div class="kv-label">${label}</div>
        <div class="kv-value">${valueHtml}</div>
      </div>`;
  }

  // --- UI Renderers ---
  function renderViewRemark_(req, requestId) {
    const remark = (req.remark || "").toString().trim() || "-";
    $("title").textContent = "Remark Details";
    $("subTitle").textContent = "เหตุผลที่ไม่อนุมัติ";

    $("rootBox").innerHTML = `
      <div class="card mb-5 text-center pt-6 pb-5">
         <div class="w-16 h-16 rounded-full bg-[#FEF2F2] flex items-center justify-center text-[#EF4444] text-3xl mx-auto mb-3 shadow-inner">💬</div>
         <div class="font-bold text-[#1F2937] text-lg">รายการถูกปฏิเสธ</div>
         <div class="text-xs text-[#9CA3AF] mt-1 font-mono">Req No. ${shortReqId(req.requestId || requestId)}</div>
      </div>
      <div class="bg-[#FEF2F2] rounded-xl p-4 mb-6">
        <div class="text-xs font-bold text-[#B91C1C] mb-2">เหตุผล (Remark):</div>
        <div class="text-sm text-[#7F1D1D] whitespace-pre-wrap leading-relaxed font-medium">${escapeHtml_(remark)}</div>
      </div>
      <button class="w-full bg-[#1F2937] text-white py-4 rounded-xl font-bold text-md shadow-md active:scale-95 transition-all" onclick="liff.closeWindow()">ปิดหน้าต่าง</button>
    `;
  }

  function renderReject_(req, requestId) {
    const dateText = formatLeaveRangeShort(req.startDate, req.endDate);
    const attUrl = (req.attachmentUrl || "").trim();

    $("title").textContent = "Reject Leave ❌";
    $("subTitle").textContent = "ไม่อนุมัติคำขอลา";

    let html = `
      <div class="card mb-5">
        <div class="text-center mb-4">
          <div class="text-4xl mb-2">📥</div>
          <div class="font-bold text-lg text-[#1F2937]">Pending Approval</div>
          <div class="text-xs font-bold text-[#EAB308] mt-1 uppercase">รออนุมัติ</div>
        </div>
        <hr class="border-[#F3F4F6] mb-4" />
        <div class="space-y-1">
          ${renderDataRow("Req No.", shortReqId(req.requestId || requestId))}
          ${renderDataRow("Name", escapeHtml_(req.name || "-"))}
          ${renderDataRow("Type", escapeHtml_(req.leaveType || "-"))}
          ${renderDataRow("Date", dateText)}
          ${renderDataRow("Days", escapeHtml_(String(req.leaveDays ?? "-")))}
          ${renderDataRow("Attach", attUrl ? "คลิกเพื่อดูไฟล์" : "—", !!attUrl, attUrl)}
        </div>
      </div>

      <div class="bg-[#FEF2F2] rounded-xl p-4 mb-6 border border-[#FEE2E2]">
        <label class="block text-xs font-bold text-[#B91C1C] mb-2 uppercase">เหตุผลที่ไม่อนุมัติ *</label>
        <textarea id="rejectRemark" rows="4" class="w-full bg-white border border-[#FCA5A5] rounded-lg p-3 outline-none focus:border-[#EF4444] transition-all text-sm text-[#7F1D1D] resize-none" placeholder="ระบุเหตุผล..."></textarea>
        <div id="remarkErr" class="hidden text-xs text-[#EF4444] mt-2 font-bold italic">! กรุณากรอกเหตุผลก่อนกดยืนยัน</div>
      </div>

      <div class="space-y-3">
        <button id="submitBtn" class="w-full bg-[#EF4444] text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-all" onclick="submitReject_('${escapeAttr_(req.requestId || requestId)}')">❌ ยืนยันการไม่อนุมัติ</button>
        <button class="w-full bg-white border border-[#E5E7EB] text-[#9CA3AF] py-4 rounded-xl font-bold active:scale-95 transition-all" onclick="liff.closeWindow()">ยกเลิก</button>
      </div>`;
    
    $("rootBox").innerHTML = html;
  }

  // --- Logic Functions ---
  async function submitReject_(requestId) {
    const remark = ($("rejectRemark")?.value || "").trim();
    if (!remark) {
      $("remarkErr").classList.remove("hidden");
      $("rejectRemark").classList.add("border-[#EF4444]");
      return;
    }

    try {
      showLoader("Saving...");
      const profile = await liff.getProfile();
      const res = await postFormUrlEncoded_({ action: "reject_leave", requestId, actorUserId: profile.userId, remark });

      if (res && res.ok) {
        await liff.sendMessages([{ type: "text", text: "LEAVE_REJECTED:" + requestId }]);
        hideLoader();
        $("rootBox").innerHTML = `
          <div class="card text-center py-12 mt-10 border border-[#10B981]">
            <div class="w-20 h-20 rounded-full bg-[#ECFDF5] flex items-center justify-center text-[#10B981] text-4xl mx-auto mb-4 animate-bounce">✅</div>
            <div class="text-xl font-bold text-[#1F2937]">บันทึกผลสำเร็จ</div>
          </div>`;
        setTimeout(() => liff.closeWindow(), 1500);
      } else {
        throw new Error(res.error || "Failed");
      }
    } catch (e) {
      hideLoader();
      alert("Error: " + e.message);
    }
  }

  async function init() {
    showLoader("Loading...");
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const params = new URLSearchParams(location.search);
    const mode = params.get("mode"), requestId = params.get("requestId");
    if (!mode || !requestId) return renderNotFound_();

    const data = await getRequest_(requestId);
    hideLoader();
    if (!data || !data.ok || !data.request) return renderNotFound_();

    if (mode === "view_remark") renderViewRemark_(data.request, requestId);
    else if (mode === "reject") renderReject_(data.request, requestId);
    else renderNotFound_();
  }

  function showLoader(msg){ $("loaderText").textContent = msg; $("loader").classList.replace("hidden", "flex"); }
  function hideLoader(){ $("loader").classList.replace("flex", "hidden"); }
  function escapeHtml_(s) { return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  function escapeAttr_(s) { return escapeHtml_(s).replace(/'/g, "&#39;"); }

  init().catch(e => alert(e.message));
</script>
</body>
</html>
